services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-deepseek-ocr}"
      PORT: "${PORT:-8000}"
    depends_on:
      - ollama

volumes:
  ollama_data:
